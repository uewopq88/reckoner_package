# =============================================================================
# Configuration for the QPS fairness model (Reckoner-based recidivism predictor)
#
# Two sections:
#   - training : default hyperparameters (any of these can be overridden on the
#                command line, e.g. --lr 0.0005 --epochs 200)
#   - datasets : per-dataset profiles. Select one with --dataset <name>
#
# The main prediction model is logistic regression (task requirement).
# input_size is detected automatically from the loaded data, so it is NOT a
# hyperparameter you need to set here.
# =============================================================================

training:
  learning_rate: 0.001      # Adam learning rate
  batch_size: 16            # mini-batch size
  epochs: 50                # max epochs per training stage
  device: cpu               # 'cpu' or 'cuda'
  verbose: true             # print per-epoch training logs
  model_path: ./temp_models/  # directory where intermediate models are saved
  signiture: test           # tag added to saved model file names
  run_id: 1                 # unique id added to saved model file names
  seed: 7                   # random seed for the train/valid/test splits

  # Data-split ratios (the remainder becomes the test set)
  train_ratio: 0.50
  valid_ratio: 0.10

  # Reckoner method hyperparameters
  c_threshold: 0.6          # identification: high/low confidence split threshold
  ema_momentum: 0.999       # refinement: EMA weight for the high generator
  pseudo_epochs: 3          # refinement: pseudo-learning epochs for low generator
  predict_threshold: 0.5    # classification probability threshold
  noise_hidden_size: 64     # hidden size of the learnable NoiseGenerator

# -----------------------------------------------------------------------------
# Dataset profiles
#
# Per-column processing is fully configurable:
#   numeric_columns      -> StandardScaler (fit on the training split only)
#   categorical_columns  -> one-hot encoding (single value per cell)
#   multihot_columns     -> multi-hot encoding (multi-value, split on separator)
#   hash_columns         -> FeatureHasher   (multi-value / high-cardinality)
#
# Sensitive attributes:
#   sensitive_exclude_columns -> ALL removed from the features (train & test)
#   sensitive_label_column    -> ONE column used to derive the fairness group
#   race_list                 -> canonical list of race tags to match against
#   privileged_race           -> which tag counts as privileged (rest = non-priv)
#   match_method              -> exact | fuzzy | keyword | bert
#   match_threshold           -> similarity cutoff for fuzzy/bert matching
#   multivalue_separator      -> character separating multiple values in a cell
# -----------------------------------------------------------------------------
datasets:

  # Recidivism prediction (whether an offender will re-offend).
  compas:
    data_name: compas-scores-two-years
    predict_attr: is_recid
    query_str: "race in ('African-American','Caucasian')"
    numeric_columns:
      - juv_fel_count
      - juv_misd_count
      - juv_other_count
      - priors_count
      - age
    categorical_columns:
      - c_charge_degree
      - age_cat
      - sex
    hash_columns:
      - c_charge_desc          # high-cardinality (~410 values) -> FeatureHasher
    hash_n_features:
      c_charge_desc: 20
    sensitive_exclude_columns:
      - race
    sensitive_label_column: race
    race_list:
      - African-American
      - Caucasian
    privileged_race: Caucasian
    match_method: exact        # COMPAS race values are already clean

  # Income prediction (kept for reference / comparison).
  new_adult:
    data_name: new_adult
    predict_attr: income_label
    numeric_columns:
      - hours-per-week
      - age
      - capital-gain
      - capital-loss
      - education-num
    categorical_columns:
      - workclass
      - education
      - marital-status
      - relationship
      - gender
      - native-country
      - occupation
    sensitive_exclude_columns:
      - race
    sensitive_label_column: race
    race_list:
      - White
      - Black
      - Asian-Pac-Islander
      - Amer-Indian-Eskimo
      - Other
    privileged_race: White
    match_method: exact

  # QPS revictimisation prediction (the real task).
  # NOTE: column lists / race_list / privileged_race are placeholders -- update
  # them once the real data extract is available.
  qps:
    data_name: qps_revictimisation
    predict_attr: Revictimised
    query_str: null
    numeric_columns:
      - DeltaDays
    categorical_columns:
      - AgeBracket
      - Gender
      - District
    multihot_columns:
      - Class                  # multi-value, low cardinality -> multi-hot
    hash_columns:
      - IncidentTypes          # multi-value, high cardinality -> FeatureHasher
    hash_n_features:
      IncidentTypes: 20
    sensitive_exclude_columns: # BOTH race columns removed from features
      - Race
      - SelfDefinedRace
    sensitive_label_column: SelfDefinedRace   # used for the fairness group only
    race_list:                 # TODO: replace with the real canonical race list
      - Caucasian
      - Aboriginal
      - Torres Strait Islander
      - Asian
      - African
      - Pacific Islander
    privileged_race: Caucasian # TODO: confirm the privileged group
    match_method: fuzzy        # fuzzy string matching (difflib); or 'bert'
    match_threshold: 0.6
    multivalue_separator: ";"
