# =============================================================================
# Configuration for the QPS fairness model (Reckoner-based recidivism predictor)
#
# Two sections:
#   - training : default hyperparameters (any of these can be overridden on the
#                command line, e.g. --lr 0.0005 --epochs 200)
#   - datasets : per-dataset profiles. Select one with --dataset <name>
#
# The main prediction model is logistic regression (task requirement).
# input_size is detected automatically from the loaded data, so it is NOT a
# hyperparameter you need to set here.
# =============================================================================

training:
  learning_rate: 0.001      # Adam learning rate
  batch_size: 16            # mini-batch size
  epochs: 50                # max epochs per training stage
  device: cpu               # 'cpu' or 'cuda'
  verbose: true             # print per-epoch training logs
  model_path: ./temp_models/  # directory where intermediate models are saved
  signiture: test           # tag added to saved model file names
  run_id: 1                 # unique id added to saved model file names
  seed: 7                   # random seed for the train/valid/test splits

  # Data-split ratios (the remainder becomes the test set)
  train_ratio: 0.50
  valid_ratio: 0.10

  # Reckoner method hyperparameters
  c_threshold: 0.6          # identification: high/low confidence split threshold
  ema_momentum: 0.999       # refinement: EMA weight for the high generator
  pseudo_epochs: 3          # refinement: pseudo-learning epochs for low generator
  predict_threshold: 0.5    # classification probability threshold
  noise_hidden_size: 64     # hidden size of the learnable NoiseGenerator

# -----------------------------------------------------------------------------
# Dataset profiles
# -----------------------------------------------------------------------------
datasets:

  # Recidivism prediction (whether an offender will re-offend) -- the main task.
  compas:
    data_name: compas-scores-two-years
    sensitive: race
    predict_attr: is_recid
    query_str: "race in ('African-American','Caucasian')"
    use_FeatureHasher: true
    n_features: 20          # FeatureHasher output dimension
    intertsted_columns:
      - juv_fel_count
      - juv_misd_count
      - juv_other_count
      - priors_count
      - age
      - c_charge_degree
      - c_charge_desc
      - age_cat
      - sex
      - race
      - is_recid
    categorical_features:
      - c_charge_desc
    sensitive_mapping:
      race_African-American: 0
      race_Caucasian: 1

  # Income prediction (kept for reference / comparison).
  # NOTE: no sensitive_mapping is defined here, matching the original behaviour.
  new_adult:
    data_name: new_adult
    sensitive: race
    predict_attr: income_label
    use_FeatureHasher: true
    n_features: 20
    intertsted_columns:
      - hours-per-week
      - age
      - capital-gain
      - capital-loss
      - education-num
      - workclass
      - education
      - marital-status
      - relationship
      - gender
      - native-country
      - occupation
      - race
      - income_label
    categorical_features:
      - workclass
      - education
      - marital-status
      - relationship
      - gender
      - native-country
      - occupation
    sensitive_mapping: null
